<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pool Advisor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 60px 20px 40px;
      color: #1a1a1a;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #0077b6;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 8px;
      font-size: 0.95rem;
      color: #555;
    }

    .card {
      width: 100%;
      max-width: 640px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      padding: 11px 14px;
      font-size: 0.95rem;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
      color: #1a1a1a;
    }

    input[type="text"]:focus {
      border-color: #0077b6;
      box-shadow: 0 0 0 3px rgba(0, 119, 182, 0.12);
    }

    input[type="text"]::placeholder {
      color: #aab4c0;
    }

    button {
      padding: 11px 22px;
      background: #0077b6;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, opacity 0.2s;
    }

    button:hover:not(:disabled) { background: #005f8e; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    .hint {
      margin-top: 8px;
      font-size: 0.78rem;
      color: #888;
    }

    /* Response area */
    #response-area {
      margin-top: 24px;
      display: none;
    }

    .response-box {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 18px 20px;
      font-size: 0.93rem;
      line-height: 1.7;
      color: #1a1a1a;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .response-label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #0077b6;
      margin-bottom: 10px;
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error { color: #c0392b; }
  </style>
</head>
<body>

  <header>
    <h1>🏊 Pool Advisor</h1>
    <p>Paste your Pool Math share code and get personalized advice.</p>
  </header>

  <div class="card">
    <label for="share-code">Pool Math Share Code</label>
    <div class="input-row">
      <input
        type="text"
        id="share-code"
        placeholder="e.g. aB3xYz or full URL"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      />
      <button id="analyze-btn" onclick="analyze()">Analyze</button>
    </div>
    <p class="hint">
      Find your code in the Pool Math app → Settings → Share → enable → copy link.
      Paste the full URL or just the last part.
    </p>

    <div id="response-area">
      <div class="response-label">Pool Advisor</div>
      <div class="response-box" id="response-text"></div>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://pool-advisor-proxy.9r568xhjmx.workers.dev";

    function extractShareCode(input) {
      input = input.trim().replace(/\/+$/, ""); // strip trailing slashes
      // If it looks like a URL, grab the last path segment
      try {
        const url = new URL(input.startsWith("http") ? input : "https://" + input);
        const parts = url.pathname.split("/").filter(Boolean);
        if (parts.length > 0) return parts[parts.length - 1];
      } catch (_) {}
      // Otherwise treat as raw share code
      return input;
    }

    async function analyze() {
      const rawInput = document.getElementById("share-code").value;
      const btn = document.getElementById("analyze-btn");
      const responseArea = document.getElementById("response-area");
      const responseText = document.getElementById("response-text");

      if (!rawInput.trim()) {
        responseArea.style.display = "block";
        responseText.className = "response-box error";
        responseText.textContent = "Please enter your Pool Math share code or URL.";
        return;
      }

      const shareCode = extractShareCode(rawInput);

      // Loading state
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Analyzing…';
      responseArea.style.display = "block";
      responseText.className = "response-box";
      responseText.textContent = "Fetching your pool data…";

      try {
        const res = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ shareCode }),
        });

        if (!res.ok) {
          const err = await res.text();
          throw new Error(`Worker error ${res.status}: ${err}`);
        }

        const data = await res.json();
        responseText.className = "response-box";
        responseText.textContent = data.advice || data.message || JSON.stringify(data, null, 2);

      } catch (err) {
        responseText.className = "response-box error";
        responseText.textContent = "Something went wrong: " + err.message;
      } finally {
        btn.disabled = false;
        btn.innerHTML = "Analyze";
      }
    }

    // Allow Enter key to submit
    document.getElementById("share-code").addEventListener("keydown", (e) => {
      if (e.key === "Enter") analyze();
    });
  </script>

</body>
</html>
